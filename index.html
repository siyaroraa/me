<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moments - by Siya</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Manrope:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="page">
      <h1>Moments - by Siya</h1>

      <section class="gallery" aria-label="Photo gallery">
        <figure class="gallery-item">
          <img
            src="gallery/IMG_3404.JPG"
            alt="Portfolio image 1"
            data-note="This one stays with me because it felt still and full at the same time. It is the kind of moment I never want to rush past."
          />
          <figcaption class="watermark">S.A</figcaption>
        </figure>
        <figure class="gallery-item">
          <img
            src="gallery/IMG_3278.jpg"
            alt="Portfolio image 2"
            data-note="I love this image for its softness. It reminds me how much emotion can live inside a quiet frame."
          />
          <figcaption class="watermark">S.A</figcaption>
        </figure>
        <figure class="gallery-item">
          <img
            src="gallery/IMG_4211.JPG"
            alt="Portfolio image 3"
            data-note="This photo feels personal to me because it holds a mood more than a subject. It captures the atmosphere I was feeling in that instant."
          />
          <figcaption class="watermark">S.A</figcaption>
        </figure>
        <figure class="gallery-item">
          <img
            src="gallery/IMG_3756.JPG"
            alt="Portfolio image 4"
            data-note="I kept this one because it feels balanced and honest. It says something simple, and that is exactly why I love it."
          />
          <figcaption class="watermark">S.A</figcaption>
        </figure>
        <figure class="gallery-item">
          <img
            src="gallery/IMG_3345.JPG"
            alt="Portfolio image 5"
            data-note="This image feels like a memory I managed to keep. There is something about the composition that brings me right back to that moment."
          />
          <figcaption class="watermark">S.A</figcaption>
        </figure>
        <figure class="gallery-item">
          <img
            src="gallery/IMG_5181.JPG"
            alt="Portfolio image 6"
            data-note="I am drawn to this one because of the way it holds texture and feeling together. It feels both intimate and open."
          />
          <figcaption class="watermark">S.A</figcaption>
        </figure>
        <figure class="gallery-item">
          <img
            src="gallery/IMG_2760.JPG"
            alt="Portfolio image 7"
            data-note="This photo means a lot to me because it catches something fleeting. It is the kind of detail that would have been easy to miss."
          />
          <figcaption class="watermark">S.A</figcaption>
        </figure>
        <figure class="gallery-item">
          <img
            src="gallery/IMG_2627.jpg"
            alt="Portfolio image 8"
            data-note="I kept coming back to this image because it feels grounded. It reminds me why I like photographing everyday beauty."
          />
          <figcaption class="watermark">S.A</figcaption>
        </figure>
        <figure class="gallery-item">
          <img
            src="gallery/IMG_0334_2.jpg"
            alt="Portfolio image 9"
            data-note="There is something nostalgic about this one for me. It feels less like a document and more like a small piece of time."
          />
          <figcaption class="watermark">S.A</figcaption>
        </figure>
        <figure class="gallery-item">
          <img
            src="gallery/IMG_7404.jpg"
            alt="Portfolio image 10"
            data-note="I love the energy in this frame. It feels alive in a way that is hard to explain and easy to feel."
          />
          <figcaption class="watermark">S.A</figcaption>
        </figure>
        <figure class="gallery-item">
          <img
            src="gallery/IMG_7582.jpg"
            alt="Portfolio image 11"
            data-note="This one stands out to me because it feels both composed and spontaneous. That tension is what makes it special to me."
          />
          <figcaption class="watermark">S.A</figcaption>
        </figure>
        <figure class="gallery-item">
          <img
            src="gallery/IMG_9115.jpeg"
            alt="Portfolio image 12"
            data-note="I included this image because it feels quietly emotional. It is one of those photos that says more the longer I look at it."
          />
          <figcaption class="watermark">S.A</figcaption>
        </figure>
        <figure class="gallery-item">
          <img
            src="gallery/IMG_6207_3.jpeg"
            alt="Portfolio image 13"
            data-note="This is one of my favorites because it feels personal without trying too hard. It holds the exact kind of quiet meaning I want this portfolio to have."
          />
          <figcaption class="watermark">S.A</figcaption>
        </figure>
      </section>
    </main>

    <div class="lightbox" aria-hidden="true">
      <button class="lightbox-close" type="button" aria-label="Close image">
        ×
      </button>
      <div class="lightbox-panel">
        <img class="lightbox-image" src="" alt="" />
        <div class="lightbox-note-wrap">
          <p class="lightbox-label">Note</p>
          <p class="lightbox-note"></p>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
